{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sup-platform.fullname" . }}-migrate
  labels:
    {{- include "sup-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "sup-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ include "sup-platform.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/init-tenant"]
          envFrom:
            - configMapRef:
                name: {{ include "sup-platform.fullname" . }}-config
            - secretRef:
                name: {{ include "sup-platform.fullname" . }}-secret
          env:
            - name: INIT_TENANT_NAME
              value: {{ .Values.init.tenantName | quote }}
            - name: ADMIN_USERNAME
              value: {{ .Values.init.adminUsername | quote }}
{{- end }}
