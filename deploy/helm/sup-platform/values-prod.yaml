# SUP Platform - 生产环境配置覆盖

image:
  repository: your-registry.com/sup-platform
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 3

resources:
  requests:
    cpu: 1000m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: sup.yourdomain.com
  tls:
    enabled: true
    secretName: sup-platform-tls

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPU: 70

pdb:
  enabled: true
  minAvailable: 2

worker:
  enabled: true
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

config:
  appMode: release
  dbHost: mysql-primary.database.svc.cluster.local
  dbPort: "3306"
  dbUser: sup_app
  dbName: sup_platform
  redisAddr: "redis-master.cache.svc.cluster.local:6379"
  redisDB: "0"
  redisEnabled: "true"
  redisPrefix: sup
  jwtExpire: "24"
  multiTenantEnabled: "false"
  defaultTenantId: "1"

# 生产环境 secrets 应通过 --set 或外部 Secret 管理工具注入
# secrets:
#   dbPassword: "通过CI/CD注入"
#   redisPassword: "通过CI/CD注入"
#   jwtSecret: "通过CI/CD注入"
#   cardEncryptKey: "通过CI/CD注入"
#   adminPassword: "通过CI/CD注入"
