openapi: "3.0.3"
info:
  title: SUP聚合供货平台 API
  version: "1.0.0"
  description: |
    SUP平台RESTful API规范，兼容亿乐SUP协议。
    ## 认证方式
    - **JWT Bearer**：管理后台（/admin、/tenant-admin）
    - **Legacy签名**：客户端/供货商API（/openapi/*）
    ## 响应格式
    统一返回 `{code, message, data}`，HTTP状态码200。
    code: 0=成功, 1=业务错误, 2=参数错误, 100=认证错误, 429=限流
servers:
  - url: http://localhost:8080
    description: 本地开发
  - url: https://api.example.com
    description: 生产环境
tags:
  - name: Health
  - name: Auth
  - name: Admin-Users
  - name: Admin-Goods
  - name: Admin-Orders
  - name: Admin-Refunds
  - name: Admin-Recharges
  - name: Admin-Docking
  - name: Admin-Audit
  - name: Admin-Pricing
  - name: Admin-CustomerGroups
  - name: Admin-ApiApps
  - name: Admin-Reconciliation
  - name: Admin-Analytics
  - name: Admin-Billing
  - name: Admin-Settlement
  - name: OpenAPI-Customer
  - name: OpenAPI-Supplier
  - name: TenantAdmin

paths:
  /health:
    get:
      tags: [Health]
      summary: 存活检查（Liveness）
      security: []
      responses:
        "200":
          description: 服务存活
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  time: { type: integer }
  /readiness:
    get:
      tags: [Health]
      summary: 就绪检查（Readiness）
      description: 检测DB和Redis依赖
      security: []
      responses:
        "200":
          description: 依赖正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ready" }
                  db: { type: string, enum: [up, down] }
                  redis: { type: string, enum: [up, down] }
                  time: { type: integer }
        "503":
          description: 数据库不可用

  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      description: 验证凭据，返回JWT Token并设置HttpOnly Cookie
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username: { type: string }
                password: { type: string }
                role: { type: string, enum: [admin, supplier, customer] }
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              example: { code: 0, message: "success", data: { token: "eyJ..." } }

  # ══════════ Admin - Users ══════════
  /admin/users:
    get:
      tags: [Admin-Users]
      summary: 用户分页列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - { name: role, in: query, schema: { type: string, enum: [admin, supplier, customer] } }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list: { type: array, items: { $ref: "#/components/schemas/UserItem" } }
                          total: { type: integer }
                          page: { type: integer }
                          size: { type: integer }
    post:
      tags: [Admin-Users]
      summary: 创建新用户
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username: { type: string, minLength: 3, maxLength: 64 }
                password: { type: string, minLength: 6 }
                nickname: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                role: { type: string, enum: [admin, supplier, customer] }
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/UserItem" }

  /admin/users/{id}:
    get:
      tags: [Admin-Users]
      summary: 获取用户详情
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/UserItem" }

  /admin/users/{id}/status:
    patch:
      tags: [Admin-Users]
      summary: 修改用户状态
      description: "启用(1)或禁用(0)用户"
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: integer, enum: [0, 1] }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }

  # ══════════ Admin - Goods ══════════
  /admin/goods:
    get:
      tags: [Admin-Goods]
      summary: 商品分页列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - { name: status, in: query, schema: { type: integer }, description: "0=下架,1=上架" }
        - { name: supplier_id, in: query, schema: { type: integer } }
        - { name: keyword, in: query, schema: { type: string } }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list: { type: array, items: { $ref: "#/components/schemas/GoodsItem" } }
                          total: { type: integer }
                          page: { type: integer }
                          size: { type: integer }

  /admin/goods/{id}/status:
    patch:
      tags: [Admin-Goods]
      summary: 商品上下架
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: integer, enum: [0, 1], description: "0=下架,1=上架" }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/goods/pending:
    get:
      tags: [Admin-Goods]
      summary: 待审核商品列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/goods/{id}/approve:
    post:
      tags: [Admin-Goods]
      summary: 审核通过商品
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/goods/{id}/reject:
    post:
      tags: [Admin-Goods]
      summary: 拒绝商品
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - Orders ══════════
  /admin/orders:
    get:
      tags: [Admin-Orders]
      summary: 订单分页列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - { name: status, in: query, schema: { type: integer } }
        - { name: customer_id, in: query, schema: { type: integer } }
        - { name: supplier_id, in: query, schema: { type: integer } }
        - { name: start_time, in: query, schema: { type: integer }, description: "Unix时间戳" }
        - { name: end_time, in: query, schema: { type: integer }, description: "Unix时间戳" }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/orders/{id}:
    get:
      tags: [Admin-Orders]
      summary: 获取订单详情
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/orders/{id}/status:
    post:
      tags: [Admin-Orders]
      summary: 修改订单状态
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: integer }
                remark: { type: string }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - Refunds ══════════
  /admin/refunds:
    get:
      tags: [Admin-Refunds]
      summary: 退款列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - { name: status, in: query, schema: { type: integer } }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list: { type: array, items: { $ref: "#/components/schemas/RefundItem" } }
                          total: { type: integer }
                          page: { type: integer }
                          size: { type: integer }

  /admin/refunds/{id}/approve:
    post:
      tags: [Admin-Refunds]
      summary: 批准退款
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, description: 审核备注 }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/refunds/{id}/reject:
    post:
      tags: [Admin-Refunds]
      summary: 拒绝退款
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note: { type: string, description: 拒绝原因 }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - Recharges ══════════
  /admin/recharges:
    get:
      tags: [Admin-Recharges]
      summary: 充值列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - { name: user_id, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: integer } }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list: { type: array, items: { $ref: "#/components/schemas/RechargeItem" } }
                          total: { type: integer }
                          page: { type: integer }
                          size: { type: integer }

  /admin/recharges/{id}/approve:
    post:
      tags: [Admin-Recharges]
      summary: 批准充值
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/recharges/{id}/reject:
    post:
      tags: [Admin-Recharges]
      summary: 拒绝充值
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note: { type: string }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - Docking ══════════
  /admin/docking-tasks/failed:
    get:
      tags: [Admin-Docking]
      summary: 失败对接任务列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list: { type: array, items: { $ref: "#/components/schemas/DockingTaskItem" } }
                          total: { type: integer }
                          page: { type: integer }
                          size: { type: integer }

  /admin/docking-tasks/{id}/retry:
    post:
      tags: [Admin-Docking]
      summary: 手动重试对接任务
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/docking-tasks/stats:
    get:
      tags: [Admin-Docking]
      summary: 对接统计
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: supplier_id, in: query, schema: { type: integer } }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - Audit ══════════
  /admin/audit:
    get:
      tags: [Admin-Audit]
      summary: 审计日志列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - { name: user_id, in: query, schema: { type: integer } }
        - { name: action, in: query, schema: { type: string }, description: "操作类型如user.create" }
        - { name: resource, in: query, schema: { type: string }, description: "资源类型如user/goods" }
        - { name: start_time, in: query, schema: { type: integer } }
        - { name: end_time, in: query, schema: { type: integer } }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list: { type: array, items: { $ref: "#/components/schemas/AuditLogItem" } }
                          total: { type: integer }
                          page: { type: integer }
                          size: { type: integer }

  # ══════════ Admin - Pricing ══════════
  /admin/pricing/rules:
    post:
      tags: [Admin-Pricing]
      summary: 创建定价规则
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PricingRuleCreate" }
      responses:
        "201": { description: 创建成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }
        "409": { description: 规则冲突, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }
    get:
      tags: [Admin-Pricing]
      summary: 定价规则列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - { name: goods_id, in: query, schema: { type: integer } }
        - { name: rule_type, in: query, schema: { type: string } }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/pricing/rules/{id}:
    put:
      tags: [Admin-Pricing]
      summary: 更新定价规则
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PricingRuleCreate" }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }
    delete:
      tags: [Admin-Pricing]
      summary: 删除定价规则
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/pricing/calc-preview:
    post:
      tags: [Admin-Pricing]
      summary: 定价计算预览
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goods_id, quantity]
              properties:
                goods_id: { type: integer }
                customer_id: { type: integer }
                quantity: { type: integer }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - Customer Groups ══════════
  /admin/customer-groups:
    post:
      tags: [Admin-CustomerGroups]
      summary: 创建客户分组
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }
    get:
      tags: [Admin-CustomerGroups]
      summary: 客户分组列表
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/customer-groups/{id}/members:
    post:
      tags: [Admin-CustomerGroups]
      summary: 添加分组成员
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: integer }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/customer-groups/{id}/members/{memberId}:
    delete:
      tags: [Admin-CustomerGroups]
      summary: 移除分组成员
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - { name: memberId, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - API Apps ══════════
  /admin/api-apps:
    get:
      tags: [Admin-ApiApps]
      summary: API应用列表
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/api-apps/{id}/rate-limit:
    patch:
      tags: [Admin-ApiApps]
      summary: 更新限流配置
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rpm: { type: integer, description: 每分钟请求数 }
                daily_limit: { type: integer, description: 每日请求数 }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/api-apps/{id}/usage:
    get:
      tags: [Admin-ApiApps]
      summary: 应用用量统计
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  # ══════════ Admin - Reconciliation ══════════
  /admin/reconciliation/run:
    post:
      tags: [Admin-Reconciliation]
      summary: 执行对账
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                supplier_id: { type: integer }
                date: { type: string, description: "YYYY-MM-DD" }
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/reconciliation/tasks:
    get:
      tags: [Admin-Reconciliation]
      summary: 对账任务列表
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/reconciliation/tasks/{id}:
    get:
      tags: [Admin-Reconciliation]
      summary: 对账任务详情
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: 成功, content: { application/json: { schema: { $ref: "#/components/schemas/Response" } } } }

  /admin/reconciliation/errors/{id}:
    patch:
      tags: [Admin-Reconciliation]
      summary: 解决对账差异
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
