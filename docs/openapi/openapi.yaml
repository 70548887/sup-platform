# ════════════════════════════════════
# Components
# ════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 管理后台JWT认证，通过 POST /auth/login 获取
    LegacySignature:
      type: apiKey
      in: header
      name: AppToken
      description: |
        Legacy签名认证（/openapi/*）。需同时传递：
        AppId, AppTimestamp, AppToken=SHA1(AppId+AppSecret+URI+Timestamp), AppNonce(可选)

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: integer }
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    SizeParam:
      name: size
      in: query
      schema: { type: integer, default: 20, maximum: 100 }

  schemas:
    Response:
      type: object
      properties:
        code: { type: integer, description: "0成功/1业务错误/2参数错误/100认证错误/429限流", example: 0 }
        message: { type: string, example: "success" }
        data: { description: 业务数据 }

    PaginatedList:
      type: object
      properties:
        list: { type: array, items: {} }
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }

    UserItem:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        nickname: { type: string }
        email: { type: string }
        phone: { type: string }
        role: { type: string, enum: [admin, supplier, customer] }
        status: { type: integer, description: "0=禁用,1=启用" }
        created_at: { type: integer, description: Unix时间戳 }
        updated_at: { type: integer }

    GoodsItem:
      type: object
      properties:
        id: { type: integer }
        serial_number: { type: string }
        name: { type: string }
        price: { type: string, description: decimal字符串 }
        cost_price: { type: string }
        stock: { type: integer }
        status: { type: integer, description: "0=下架,1=上架" }
        category_id: { type: integer }
        supplier_id: { type: integer }
        created_at: { type: integer }
        updated_at: { type: integer }

    RefundItem:
      type: object
      properties:
        id: { type: integer }
        refund_sn: { type: string }
        order_id: { type: integer }
        order_sn: { type: string }
        customer_id: { type: integer }
        amount: { type: string }
        reason: { type: string }
        status: { type: integer, description: "0=待审核,1=已批准,2=已拒绝,3=已退款" }
        reviewer_id: { type: integer, nullable: true }
        review_note: { type: string }
        reviewed_at: { type: integer, nullable: true }
        refunded_at: { type: integer, nullable: true }
        created_at: { type: integer }
        updated_at: { type: integer }

    RechargeItem:
      type: object
      properties:
        id: { type: integer }
        recharge_sn: { type: string }
        user_id: { type: integer }
        amount: { type: string }
        status: { type: integer, description: "0=待审核,1=已批准,2=已拒绝" }
        approver_id: { type: integer, nullable: true }
        approval_note: { type: string }
        approved_at: { type: integer, nullable: true }
        created_at: { type: integer }
        updated_at: { type: integer }

    DockingTaskItem:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        supplier_id: { type: integer }
        external_order_id: { type: string }
        status: { type: integer }
        retry_count: { type: integer }
        max_retry: { type: integer }
        error_message: { type: string }
        is_manual_retry: { type: boolean }
        last_failure_at: { type: integer, nullable: true }
        created_at: { type: integer }
        updated_at: { type: integer }

    AuditLogItem:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        action: { type: string, description: "如user.create、goods.approve" }
        resource: { type: string }
        resource_id: { type: integer }
        detail: { type: string }
        ip: { type: string }
        created_at: { type: integer }

    PricingRuleCreate:
      type: object
      required: [goods_id, rule_type]
      properties:
        goods_id: { type: integer }
        rule_type: { type: string, description: "fixed/discount/tiered" }
        customer_group_id: { type: integer }
        min_quantity: { type: integer, default: 1 }
        max_quantity: { type: integer, default: 999999 }
        price: { type: string }
        discount_percent: { type: string }
        promotion_name: { type: string }
        start_at: { type: integer, nullable: true }
        end_at: { type: integer, nullable: true }
        priority: { type: integer }
        status: { type: integer, default: 1 }

    BillingPlanItem:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        display_name: { type: string }
        monthly_price: { type: string }
        max_api_calls_per_month: { type: integer }
        max_orders: { type: integer }
        max_admins: { type: integer }
        features: { type: string }
        status: { type: integer }

    PeriodStats:
      type: object
      properties:
        date: { type: string }
        total_orders: { type: integer }
        total_amount: { type: string }
        total_refunds: { type: integer }
        refund_amount: { type: string }
        new_customers: { type: integer }
        active_customers: { type: integer }
